name: Build and Publish Helm Chart on Develop Branch

on:
  push:
    branches:
    - develop

jobs:
  validate:
    uses: ./.github/workflows/validate.yaml
    secrets: inherit
  build-and-push:
    runs-on: arvato
    permissions:
      id-token: write
      contents: write  # Needed to update the VERSION file
      packages: write
    env:
      HELM_VERSION: v4.1.3
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Generate App Token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        token: ${{ steps.app-token.outputs.token }}
    - name: Install helm
      run: |
        wget -q https://get.helm.sh/helm-${HELM_VERSION}-linux-arm64.tar.gz
        tar -zxvf helm-${HELM_VERSION}-linux-arm64.tar.gz
        sudo mv linux-arm64/helm /usr/local/bin/helm
        rm -rf helm-${HELM_VERSION}-linux-arm64.tar.gz linux-arm64
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Run helm show chart
      run: |
        helm show chart .
    - name: Run helm lint
      run: |
        helm lint .
    - name: Commit & Push changes
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        if-no-commit: info
        message: 'chore: Linted files'
        files: |
          **
    - name: Package Helm Chart
      run: |
        helm package . --destination ./charts

    # - name: Push Docker Image to GHCR
    #   run: |
    #     helm push ./charts/*.tgz oci://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
