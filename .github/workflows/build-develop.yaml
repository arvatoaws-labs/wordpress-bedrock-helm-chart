name: Build and Publish Helm Chart on Develop Branch

on:
  push:
    branches:
      - develop

jobs:
  validate:
    uses: ./.github/workflows/validate.yaml
    secrets: inherit
  build-and-push:
    runs-on: arvato
    permissions:
      id-token: write
      contents: write  # Needed to update the VERSION file
      packages: write
    env:
      HELM_VERSION: v4.1.3
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Generate App Token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - name: Install helm
      run: |
        wget -q https://get.helm.sh/helm-${HELM_VERSION}-linux-arm64.tar.gz
        tar -zxvf helm-${HELM_VERSION}-linux-arm64.tar.gz
        sudo mv linux-arm64/helm /usr/local/bin/helm
        rm -rf helm-${HELM_VERSION}-linux-arm64.tar.gz linux-arm64
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Run helm show chart
      run: |
        helm show chart .
    - name: Run helm lint
      run: |
        helm lint .
    - name: Debug sigining
      run: |
        date > date.txt
    - name: Commit Updated linted files
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        # Check for changes
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes to commit."
          exit 0
        fi

        # Stage changes and get the tree
        git add -A
        TREE=$(git write-tree)
        PARENT=$(git rev-parse HEAD)

        # Create commit via GitHub API — automatically verified
        COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
          --method POST \
          -f "message=Linted files" \
          -f "tree=${TREE}" \
          -f "parents[]=${PARENT}" \
          --jq '.sha')

        # Update the branch ref
        gh api repos/${{ github.repository }}/git/refs/heads/${{ github.ref_name }} \
          --method PATCH \
          -f "sha=${COMMIT_SHA}"

        # Update local ref to match
        git fetch origin
        git reset --hard origin/${{ github.ref_name }}
    - name: Package Helm Chart
      run: |
        helm package . --destination ./charts

    # - name: Push Docker Image to GHCR
    #   run: |
    #     helm push ./charts/*.tgz oci://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
